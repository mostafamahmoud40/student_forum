services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studenthub
      POSTGRES_PASSWORD: studenthub_pass
      POSTGRES_DB: studenthub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studenthub -d studenthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API replica 1 ──────────────────────────────────────────────────────────
  api-1:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://studenthub:studenthub_pass@db:5432/studenthub
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      INSTANCE: api-1
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ── API replica 2 ──────────────────────────────────────────────────────────
  api-2:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://studenthub:studenthub_pass@db:5432/studenthub
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      INSTANCE: api-2
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ── Nginx load balancer ────────────────────────────────────────────────────
  lb:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:3000"
    depends_on:
      - api-1
      - api-2
    networks:
      - backend_net
      - public_net
    restart: unless-stopped

  # ── Frontend (static build served via nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    ports:
      - "80:80"
    networks:
      - public_net
    depends_on:
      - lb
    restart: unless-stopped

  # ── DB seeder (runs once, then exits) ─────────────────────────────────────
  seed:
    build:
      context: ./backend
    command: ["sh", "-c", "sleep 10 && npx prisma db push --accept-data-loss && npm run db:seed"]
    environment:
      DATABASE_URL: postgresql://studenthub:studenthub_pass@db:5432/studenthub
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    restart: "no"

  # ── Monitoring: container metrics ─────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    ports:
      - "8081:8080"
    command:
      - '--containerd=/run/containerd/containerd.sock'
      - '--containerd-namespace=moby'
      - '--docker_only=false'
      - '--housekeeping_interval=10s'
      - '--disable_metrics=disk,diskIO,hugetlb,referenced_memory,resctrl,cpuset,advtcp,cpu_topology,sched'
      - '--store_container_labels=true'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    networks:
      - public_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - cadvisor
    networks:
      - public_net
      - backend_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/studenthub-monitoring.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - public_net
    restart: unless-stopped

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  public_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true   # No direct internet access — only reachable from public_net via lb

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
