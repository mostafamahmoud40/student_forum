services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studenthub
      POSTGRES_PASSWORD: studenthub_pass
      POSTGRES_DB: studenthub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studenthub -d studenthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── API replica 1 ──────────────────────────────────────────────────────────
  api-1:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://studenthub:studenthub_pass@db:5432/studenthub
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      INSTANCE: api-1
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ── API replica 2 ──────────────────────────────────────────────────────────
  api-2:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://studenthub:studenthub_pass@db:5432/studenthub
      JWT_SECRET: super-secret-jwt-key-change-in-prod
      INSTANCE: api-2
      PORT: "4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # ── Nginx load balancer ────────────────────────────────────────────────────
  lb:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3000:3000"
    depends_on:
      - api-1
      - api-2
    networks:
      - backend_net
      - public_net
    restart: unless-stopped

  # ── Frontend (static build served via nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    ports:
      - "80:80"
    networks:
      - public_net
    depends_on:
      - lb
    restart: unless-stopped

  # ── DB seeder (runs once, then exits) ─────────────────────────────────────
  seed:
    build:
      context: ./backend
    command: ["sh", "-c", "sleep 10 && npx prisma db push --accept-data-loss && npm run db:seed"]
    environment:
      DATABASE_URL: postgresql://studenthub:studenthub_pass@db:5432/studenthub
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
    restart: "no"

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  public_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true   # No direct internet access — only reachable from public_net via lb

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
